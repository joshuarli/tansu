repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features --quiet -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: oxfmt
        name: oxfmt
        entry: bun run oxfmt
        language: system
        types: [ts]
        pass_filenames: false
      - id: oxlint
        name: oxlint
        entry: bun run oxlint
        language: system
        types: [ts]
        pass_filenames: false
