repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --fix --allow-dirty --all-targets --all-features --quiet -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: oxfmt
        name: oxfmt
        entry: ./node_modules/.bin/oxfmt
        language: system
        types: [ts]
        pass_filenames: false
      - id: oxlint
        name: oxlint
        entry: ./node_modules/.bin/oxlint
        language: system
        types: [ts]
        pass_filenames: false
      - id: knip
        name: knip
        entry: ./node_modules/.bin/knip
        language: system
        files: \.(ts|js|tsx|jsx|mjs)$
        pass_filenames: false
        stages: [pre-push]
