<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>tansu</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div id="sidebar-header">
          <input
            id="sidebar-search"
            type="text"
            placeholder="Filter files..."
            autocomplete="off"
            spellcheck="false"
          />
          <div id="sidebar-toolbar">
            <button id="sidebar-recent-btn" title="Recent files">Recent</button>
            <button id="sidebar-pinned-btn" title="Pinned files">Pinned</button>
            <button id="sidebar-sort-btn" title="Sort by name">Name</button>
          </div>
        </div>
        <div id="sidebar-tree"></div>
      </div>
      <div id="app-main">
        <div id="notification" class="notification hidden"></div>
        <div id="tab-bar"></div>
        <div id="editor-area">
          <div id="empty-state">
            Press <kbd>Cmd+K</kbd> to search &middot; <kbd>Cmd+P</kbd> for commands
          </div>
        </div>
      </div>
      <div id="search-overlay" class="hidden">
        <div id="search-modal">
          <input
            id="search-input"
            type="text"
            placeholder="Search notes..."
            autocomplete="off"
            spellcheck="false"
          />
          <div id="search-results"></div>
        </div>
      </div>
      <div id="settings-overlay" class="hidden">
        <div id="settings-panel"></div>
      </div>
      <div id="input-dialog-overlay" class="hidden">
        <div id="input-dialog">
          <input id="input-dialog-input" type="text" autocomplete="off" spellcheck="false" />
        </div>
      </div>
      <div id="palette-overlay" class="hidden">
        <div id="palette-modal">
          <input
            id="palette-input"
            type="text"
            placeholder="Type a command..."
            autocomplete="off"
            spellcheck="false"
          />
          <div id="palette-list"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
